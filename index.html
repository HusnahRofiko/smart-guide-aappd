<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART GUIDE AAPPD - Interactive Mind Map</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        .node-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedLaw, setSelectedLaw] = useState({ title: "", img: "" });
            const [zoom, setZoom] = useState(1);
            const [origin, setOrigin] = useState({ x: 50, y: 50 });

            const handleWheelZoom = (e) => {
                e.preventDefault();

                const rect = e.currentTarget.getBoundingClientRect();

                // posisi mouse relatif ke container (%)
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;

                setOrigin({ x, y });

                const zoomSpeed = 0.001;

                setZoom(prev => {
                    let newZoom = prev - e.deltaY * zoomSpeed;

                    if (newZoom < 0.5) newZoom = 0.5;
                    if (newZoom > 3) newZoom = 3;

                    return newZoom;
                });
            };

            const guideData = [
                {
                    id: 1,
                    title: "Referensi Dasar",
                    icon: "📚",
                    color: "blue",
                    items: [
                        { 
                            name: "UU No 25 tahun 2004", 
                            hasModal: true, 
                            img: "252004.png", 
                            link: "https://peraturan.bpk.go.id/details/40694" 
                        },
                        { 
                            name: "UU Nomor 59 Tahun 2024", 
                            hasModal: true, 
                            img: "592004.png", // <--- Ganti dengan nama file gambar UU 59 Anda
                            link: "https://peraturan.bpk.go.id/details/297293" 
                        },
                        { 
                            name: "UU no 17 tahun 2003", 
                            hasModal: true, 
                            img: "172003.png", // <--- Ganti dengan nama file gambar UU 59 Anda
                            link: "https://peraturan.bpk.go.id/details/297293" 
                        },
                        { 
                            name: "PP Nomor 6 Tahun 2023", 
                            hasModal: true, 
                            img: "62023.png", // <--- Ganti dengan nama file gambar UU 59 Anda
                            link: "https://peraturan.bpk.go.id/details/297293" 
                        },
                         { 
                            name: "PP No 40 tahun 2006", 
                            hasModal: true, 
                            img: "402006.png", // <--- Ganti dengan nama file gambar UU 59 Anda
                            link: "https://peraturan.bpk.go.id/details/297293" 
                        },
                         { 
                            name: "PP No. 17 Tahun 2017", 
                            hasModal: true, 
                            img: "172017.png", // <--- Ganti dengan nama file gambar UU 59 Anda
                            link: "https://peraturan.bpk.go.id/details/297293" 
                        },
                         { 
                            name: "permen PPN No. 1 tahun 2021", 
                            hasModal: true, 
                            img: "12021.png", // <--- Ganti dengan nama file gambar UU 59 Anda
                            link: "https://peraturan.bpk.go.id/details/297293" 
                        }
                    ]
                },
                {
                    id: 2,
                    title: "Tugas dan Fungsi",
                    icon: "⚖️",
                    color: "emerald",
                    items: [
                        { 
                            name: "Tugas dan Fungsi", 
                            hasModal: true, 
                            img: "tugasdanfungsi.png", // <--- Ganti dengan nama file gambar UU 59 Anda
                            link: "https://peraturan.bpk.go.id/details/297293" 
                        }
                    ]
                },
                {
                    id: 3,
                    title: "Timeline Perencanaan",
                    icon: "⏳",
                    color: "amber",
                    items: [
                         { 
                            name: "Timeline Perencanaan", 
                            hasModal: true, 
                            img: "timeline1.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                         { 
                            name: "Panduan Manual", 
                            hasModal: true, 
                            img: "panduan1.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                         { 
                            name: "Struktur Renja", 
                            hasModal: true, 
                            img: "strukturRenja.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                         { 
                            name: "Bilateral & Tilateral Meeting", 
                            hasModal: true, 
                            img: "bilateralMeeting.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                          { 
                            name: "Periode Perubahan Renja", 
                            hasModal: true, 
                            img: "periodePerubahan.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                         { 
                            name: "Ruang Lingkup Perubahan Renja", 
                            hasModal: true, 
                            img: "ruangLingkup.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                          { 
                            name: "Mekanisme Perubahan Renja", 
                            hasModal: true, 
                            img: "mekanisme.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                         { 
                            name: "Dokumen Pendukung Perubahan Renja", 
                            hasModal: true, 
                            img: "dokumenPerubahan.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                         { 
                            name: "Tabel Dokumen Pendukung Perubahan Renja", 
                            hasModal: true, 
                            img: "tabelPerubahan.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                         { 
                            name: "Alur Perubahan Visi, Misi, Sasaran Strategis", 
                            hasModal: true, 
                            img: "alurPerubahanVisi.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                         { 
                            name: "Perubahan Program dan Kegiatan", 
                            hasModal: true, 
                            img: "alurPerubahanProgram.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         },
                          { 
                            name: "Perubahan KRO, LRO, dan Komponen", 
                            hasModal: true, 
                            img: "perubahanKRO.jpg", // <--- Ganti dengan nama file gambar UU 59 Anda
                         }
                    ]
                }
            ];

            const openModal = (item) => {
                setSelectedLaw({ title: item.name, img: item.img, link: item.link });
                setZoom(1); // reset zoom
                setIsModalOpen(true);
            };

            return (
                <div className="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="text-center mb-16">
                            <div className="inline-block px-4 py-1.5 mb-4 text-xs font-bold tracking-widest text-blue-600 uppercase bg-blue-50 rounded-full border border-blue-100">
                                E-Handbook Visualisasi
                            </div>
                            <h1 className="text-5xl font-extrabold text-slate-900 tracking-tight">
                                SMART GUIDE <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">AAPPD</span>
                            </h1>
                            <p className="mt-4 text-slate-500 font-medium italic">
                                Navigasi Cerdas Direktorat Alokasi Pendanaan Pembangunan Pusat dan Daerah.
                            </p>
                        </header>

                        {/* Central Parent Node */}
                        <div className="flex justify-center mb-20 relative">
                            <div className="absolute inset-0 bg-blue-400 blur-[80px] opacity-10 rounded-full"></div>
                            <div className="relative z-10 bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl border-8 border-white flex flex-col items-center min-w-[320px] transition-transform hover:scale-105">
                                <div className="bg-blue-500 p-4 rounded-2xl mb-4 shadow-lg">
                                    <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                    </svg>
                                </div>
                                <h2 className="text-2xl font-black tracking-widest text-center">
                                    SMART GUIDE <br/> <span className="text-blue-400">AAPPD</span>
                                </h2>
                            </div>
                        </div>

                        {/* Child Nodes Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {guideData.map((child) => (
                                <div 
                                    key={child.id}
                                    onClick={() => setActiveTab(activeTab === child.id ? null : child.id)}
                                    className={`node-transition cursor-pointer group relative bg-white rounded-[2.5rem] p-8 border-2 shadow-sm flex flex-col items-center text-center ${
                                        activeTab === child.id 
                                        ? `border-${child.color}-500 ring-4 ring-${child.color}-50` 
                                        : 'border-slate-100 hover:border-blue-200'
                                    }`}
                                >
                                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mb-6 transition-transform group-hover:rotate-12 ${
                                        activeTab === child.id ? `bg-${child.color}-500 text-white` : 'bg-slate-50'
                                    }`}>
                                        {child.icon}
                                    </div>
                                    
                                    <h3 className={`text-xl font-bold leading-tight ${activeTab === child.id ? `text-${child.color}-600` : 'text-slate-800'}`}>
                                        {child.title}
                                    </h3>

                                    {/* Content List */}
                                    <div className={`overflow-hidden transition-all duration-500 ease-in-out ${
                                        activeTab === child.id ? 'max-h-[500px] opacity-100 mt-6 pt-6 border-t border-slate-100' : 'max-h-0 opacity-0'
                                    }`}>
                                        <ul className="space-y-4 text-left">
                                            {child.items.map((item, idx) => (
                                                <li 
                                                    key={idx} 
                                                    className={`flex gap-3 text-sm p-2 rounded-lg transition-colors ${item.hasModal ? "hover:bg-blue-50 cursor-pointer text-blue-700 font-semibold" : "text-slate-600 font-medium"}`}
                                                    onClick={(e) => {
                                                        if (item.hasModal) {
                                                            e.stopPropagation();
                                                            openModal(item);
                                                        }
                                                    }}
                                                >
                                                    <div className={`mt-1.5 w-1.5 h-1.5 rounded-full shrink-0 bg-${child.color}-500`} />
                                                    <span className="leading-relaxed">
                                                        {item.name}
                                                        {item.hasModal}
                                                    </span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>

                                    {activeTab !== child.id && (
                                        <div className="mt-4 flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                                            <span>Explore</span>
                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Pop-up Modal Dinamis */}
                    {isModalOpen && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in fade-in duration-300"
                            onClick={() => setIsModalOpen(false)}
                        >
                            <div 
                                className="relative bg-white rounded-3xl shadow-2xl max-w-5xl w-full max-h-[90vh] flex flex-col animate-in zoom-in-95 duration-300"
                                onClick={(e) => e.stopPropagation()}
                            >
                                {/* Header Modal */}
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                                    <h2 className="text-xl font-bold text-slate-800">Mind Map: {selectedLaw.title}</h2>
                                    <div className="flex items-center gap-2">
                            {/* Zoom Out */}
                                        <button 
                                            onClick={() => setZoom(prev => Math.max(prev - 0.2, 0.5))}
                                            className="px-3 py-1 bg-slate-100 rounded-lg hover:bg-slate-200"
                                        >
                                            ➖
                                        </button>

                                        {/* Zoom In */}
                                        <button 
                                            onClick={() => setZoom(prev => Math.min(prev + 0.2, 3))}
                                            className="px-3 py-1 bg-slate-100 rounded-lg hover:bg-slate-200"
                                        >
                                            ➕
                                        </button>

                                        {/* Close */}
                                        <button 
                                            onClick={() => setIsModalOpen(false)}
                                            className="p-2 hover:bg-slate-100 rounded-full"
                                        >
                                            ✕
                                        </button>
                                    </div>
                                </div>
                                
                                {/* Gambar Mind Map */}
                                <div 
                                    className="p-4 flex-1 overflow-auto bg-slate-50"
                                    onWheel={handleWheelZoom}
                                >
                                    <div className="min-w-max min-h-max flex justify-center items-start">
                                       <img 
                                            src={selectedLaw.img} 
                                            alt={`Mind Map ${selectedLaw.title}`}
                                            className="rounded-xl shadow-lg border border-slate-200 transition-transform duration-200"
                                            style={{ 
                                                transform: `scale(${zoom})`,
                                                transformOrigin: `${origin.x}% ${origin.y}%`
                                            }}
                                        />
                                    </div>
                                </div>

                                {/* Footer Modal */}
                                <div className="p-4 text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest bg-white border-t border-slate-100">
                                    <a 
                                        href={selectedLaw.link} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="hover:text-blue-500 underline"
                                    >
                                        Link Untuk Download File {selectedLaw.title}
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 text-center">
                        <div className="glass inline-flex items-center gap-4 px-6 py-3 rounded-full border border-white shadow-sm">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em]">
                                Direktorat Alokasi Pendanaan Pembangunan Pusat dan Daerah
                            </span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
